<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wachtwoord Generator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <input type="text" id="password" readonly spellcheck="false" autocomplete="off" />

      <div class="actions">
        <button id="generate" class="icon-btn" aria-label="Genereer wachtwoord">
          <img src="arrows-rotate-solid.svg" class="icon" alt="" />
        </button>
        
        <button id="copy" class="icon-btn" aria-label="Kopieer wachtwoord">
          <img src="clipboard-solid.svg" class="icon" alt="" />
        </button>
      </div>
    </div>
    <script src="script.js" defer></script>
    <script data-goatcounter="https://wachtwoordgenerator-luckyhands-nl.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
  </body>
</html>
